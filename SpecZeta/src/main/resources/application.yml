spring:
  application:
    name: SpecZeta
  profiles:
    active: dev

  # CORRIGÉ : Déplacé directement sous "spring:"
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/speczeta}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  # CORRIGÉ : Déplacé directement sous "spring:"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # CORRIGÉ : Déplacé directement sous "spring:"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # CORRIGÉ : Déplacé directement sous "spring:"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "${REDIRECT_URI:http://localhost:4200/oauth/redirect}"

  # CORRIGÉ : Déplacé directement sous "spring:"
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
    connection-timeout: 5s
    socket-timeout: 30s

  # CORRIGÉ : Déplacé directement sous "spring:"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # EMail (SMTP) — lié à spring.mail.* (MailProperties). Valeurs par défaut : Mailtrap sandbox.
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:8850cea04224c5}
    # Mot de passe masqué fourni (****a475) : à définir via la variable d'environnement MAIL_PASSWORD.
    password: ${MAIL_PASSWORD:9960062bfda475}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true   # TLS (STARTTLS) activé
          ssl:
            enable: false  # SSL désactivé

# Environment (Votre variable personnalisée nettoyée et isolée)
APP:
  ENV: dev

# JWT
app:
  mail:
    # Adresse expéditeur utilisée par OTPVerificationService (@Value("${app.mail.from}"))
    from: ${MAIL_FROM:no-reply@speczeta.com}
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-please-use-at-least-512-bits-of-entropy-base64}
    expiration-ms: 86400000
    issuer: speczeta
  dropbox:
    access-token: ${DROPBOX_ACCESS_TOKEN:}
    base-path: /annonces
    api-url: https://api.dropboxapi.com
    content-url: https://content.dropboxapi.com
  oauth2:
    authorized-redirect-uris:
      - http://localhost:4200/oauth2/redirect
      - http://localhost:3000/oauth2/redirect
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000

# Serveur
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Logging
logging:
  level:
    root: INFO
    com.djeffing.SpecZeta: DEBUG
    org.springframework.security: INFO

# Dropbox
dropbox:
  app_key: ${DROPBOX_APP_KEY:hsw17h5gye868lc}
  app_secret: ${DROPBOX_SECRET_KEY}
  access_token: ${DROPBOX_ACCESS_TOKEN}
  refresh_token: ${DROPBOX_REFRESH_TOKEN}
  environment: ${APP_ENV:dev}
  max-retries: 3
  timeout-ms: 30000